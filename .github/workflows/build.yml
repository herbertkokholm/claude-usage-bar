name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Log Xcode version
        run: xcodebuild -version

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            macos/.build/checkouts
            macos/.build/artifacts
          key: spm-${{ runner.os }}-${{ hashFiles('macos/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Run tests with coverage
        run: cd macos && swift test --enable-code-coverage

      - name: Coverage report
        run: |
          xcrun llvm-cov report \
            macos/.build/debug/ClaudeUsageBarPackageTests.xctest/Contents/MacOS/ClaudeUsageBarPackageTests \
            -instr-profile macos/.build/debug/codecov/default.profdata \
            --ignore-filename-regex='\.build|Tests'

      - name: Build app bundle
        run: make app
