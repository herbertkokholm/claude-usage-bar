name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    env:
      REPOSITORY_NAME: ${{ github.event.repository.name }}
    outputs:
      appcast_generated: ${{ steps.appcast.outputs.generated }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        continue-on-error: true

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            macos/.build/checkouts
            macos/.build/artifacts
          key: spm-${{ runner.os }}-${{ hashFiles('macos/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Run tests
        run: cd macos && swift test

      - name: Build release app bundle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          export APP_VERSION="$version"
          if [[ -n "${SPARKLE_PRIVATE_KEY:-}" ]]; then
            export SU_FEED_URL="https://${owner}.github.io/${REPOSITORY_NAME}/appcast.xml"
          fi
          bash macos/scripts/build.sh

      - name: Package and verify release artifacts
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          [[ -n "${SPARKLE_PRIVATE_KEY:-}" ]] && export EXPECT_FEED_URL=1
          bash macos/scripts/build.sh --skip-build --zip --dmg
          make verify-release

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/archives dist/site

          gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            --method POST \
            -f tag_name="${GITHUB_REF_NAME}" \
            --jq '.body' > dist/release-notes.md

          python3 - <<'PY'
          import json
          import os
          import urllib.request

          with open("dist/release-notes.md", "r", encoding="utf-8") as fh:
              markdown = fh.read()

          request = urllib.request.Request(
              "https://api.github.com/markdown",
              data=json.dumps({
                  "text": markdown,
                  "mode": "gfm",
                  "context": os.environ["GITHUB_REPOSITORY"],
              }).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
              method="POST",
          )

          with urllib.request.urlopen(request) as response:
              html = response.read().decode("utf-8")

          with open("dist/archives/ClaudeUsageBar.html", "w", encoding="utf-8") as fh:
              fh.write(html)
          PY

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            macos/ClaudeUsageBar.zip
            macos/ClaudeUsageBar.dmg
          body_path: dist/release-notes.md

      - name: Generate Sparkle appcast
        id: appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [[ -z "${SPARKLE_PRIVATE_KEY:-}" ]]; then
            echo "::warning::SPARKLE_PRIVATE_KEY not set — skipping appcast. Sparkle auto-updates will not work for this release."
            echo "generated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cp macos/ClaudeUsageBar.zip dist/archives/ClaudeUsageBar.zip

          printf '%s' "$SPARKLE_PRIVATE_KEY" | \
            macos/.build/artifacts/sparkle/Sparkle/bin/generate_appcast \
              dist/archives \
              --ed-key-file - \
              --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/" \
              --maximum-deltas 0 \
              -o dist/site/appcast.xml

          echo "generated=true" >> "$GITHUB_OUTPUT"

      - name: Upload appcast for GitHub Pages
        if: steps.appcast.outputs.generated == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/site

  deploy_appcast:
    needs: release
    if: needs.release.outputs.appcast_generated == 'true'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy appcast
        id: deployment
        uses: actions/deploy-pages@v4
